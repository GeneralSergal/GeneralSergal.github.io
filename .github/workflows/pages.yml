name: Deploy Standalone Blog

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create staging directory
        run: mkdir -p public

      - name: Stage root website files
        run: |
          # Copy the renamed blog file (now index.html)
          if [ -f index.html ]; then
            cp index.html public/
          fi
          
          # Copy avatar asset if present in this repository
          if [ -f avatar.jpg ]; then
            cp avatar.jpg public/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
