<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    ORP Δ — Icon Sprite Sheet  v4.0
    ============================================================
    ARCHITECTURE CHANGE (v4.0):
      • All filters / gradients hoisted to the ROOT <defs> block,
        NOT inside any <symbol>. This fixes the shadow-DOM filter
        scoping bug: when a <use> element references a <symbol>,
        its internal <defs> are processed in the symbol's scope,
        not the host document scope, causing url(#id) lookups to
        fail silently in Firefox and Safari.
      • IDs are STATIC and globally unique — prefix "orp-" guards
        against collisions with page-level defs.  No runtime
        Math.random() rewriting required or permitted.
      • The logo-mark symbol is fully self-contained via class
        names for animation — CSS drives all motion.
      • favicon-mark kept as clean no-filter fallback.

    USAGE:
      Inline the entire file once (or fetch+innerHTML once):
        <img src="assets/icons.svg">  ← won't see defs
        Better: inject via JS once, then use <use>:
          <svg width="48" height="48"><use href="#orp-logo-mark"/></svg>

      Or reference externally (Chrome/Edge only, loses root defs):
        <svg><use href="assets/icons.svg#orp-logo-mark"/></svg>

      RECOMMENDED: inject this file's content as innerHTML of a
      hidden div at the top of <body>. All symbols are then in
      the document scope and url(#orp-*) lookups resolve correctly
      across all browsers including Firefox and Safari.

    GEOMETRY  (viewBox 0 0 100 100, centroid 50,50):
      Triangles  — outer red / mid orange / inner cyan
      Wings      — 3 feathers each side, radiating from 50,50
      Orbit ring — r=42 dashed + 4 cardinal dots
      Hexagon    — dashed outline
      Core fill  — radial gradient circle r=23
      Diamond    — 4-point at core
      White dot  — 2.5r at 50,50
      Glitch     — offset triangle copies (cyan + red)
      Fracture   — corner accent shards at triangle tips
      Scanlines  — horizontal bars inside triangle
    ============================================================
  -->

  <!-- ═══════════════════════════════════════════════════════════
       ROOT DEFS — hoisted here so url(#orp-*) resolves correctly
       in every browser regardless of how symbols are consumed.
       ═══════════════════════════════════════════════════════════ -->
  <defs>

    <!-- ── Glow filters ──────────────────────────────────────── -->

    <!-- Tight core glow — used on triangles, diamond, white dot -->
    <filter id="orp-glow-core" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"   result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Wide outer glow — wings, orbit markers -->
    <filter id="orp-glow-outer" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cyan glow — inner triangle, glitch layer -->
    <filter id="orp-glow-cyan" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow — orbit dots, fracture shards -->
    <filter id="orp-glow-soft" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Gradients ─────────────────────────────────────────── -->

    <!-- Core radial fill — subtle warm bloom behind triangles -->
    <radialGradient id="orp-core-fill" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff4400" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#dd1111" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#dd1111" stop-opacity="0"/>
    </radialGradient>

    <!-- Aura — outermost ambient halo -->
    <radialGradient id="orp-aura-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff6600" stop-opacity="0.10"/>
      <stop offset="70%"  stop-color="#dd1111" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Left wing gradient — warm red→orange→fade -->
    <linearGradient id="orp-wing-grad-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#dd1111" stop-opacity="0.72"/>
      <stop offset="50%"  stop-color="#ff4400" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Right wing gradient — mirrored -->
    <linearGradient id="orp-wing-grad-r" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#dd1111" stop-opacity="0.72"/>
      <stop offset="50%"  stop-color="#ff4400" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0.08"/>
    </linearGradient>

    <!-- ── Clip path for scanlines ───────────────────────────── -->
    <!-- Clipped to the outer triangle bounds so scanlines stay inside -->
    <clipPath id="orp-scan-clip">
      <polygon points="50,22 74,64 26,64"/>
    </clipPath>

  </defs>


  <!-- ═══════════════════════════════════════════════════════════
       SYMBOL: orp-logo-mark
       Full Sigil vocabulary fitted to 100×100.
       All animated parts carry semantic class names;
       CSS (style.css patch) drives all motion.
       ═══════════════════════════════════════════════════════════ -->
  <symbol id="orp-logo-mark" viewBox="0 0 100 100" overflow="visible">

    <!-- ── 0. Ambient aura (static, no animation) ─────────── -->
    <circle cx="50" cy="50" r="46" fill="url(#orp-aura-grad)"/>

    <!-- ── 1. Orbit ring + cardinal markers ─────────────────
         Class: orp-orbit-ring  → CSS rotates this group
         transform-origin set via CSS transform-box:fill-box
    ─────────────────────────────────────────────────────── -->
    <g class="orp-orbit-ring" style="transform-origin:50px 50px">
      <!-- Dashed orbit circle r=42 -->
      <circle cx="50" cy="50" r="42"
              fill="none"
              stroke="#dd1111" stroke-width="0.4"
              stroke-opacity="0.22" stroke-dasharray="3 6"/>
      <!-- Cardinal dot — top -->
      <circle cx="50"  cy="8"  r="1.4" fill="#dd1111" fill-opacity="0.6"
              filter="url(#orp-glow-soft)"/>
      <!-- Cardinal dot — right -->
      <circle cx="92"  cy="50" r="1.4" fill="#ff6600" fill-opacity="0.6"
              filter="url(#orp-glow-soft)"/>
      <!-- Cardinal dot — bottom -->
      <circle cx="50"  cy="92" r="1.4" fill="#dd1111" fill-opacity="0.6"
              filter="url(#orp-glow-soft)"/>
      <!-- Cardinal dot — left -->
      <circle cx="8"   cy="50" r="1.4" fill="#ff6600" fill-opacity="0.6"
              filter="url(#orp-glow-soft)"/>
      <!-- Diagonal tick marks at 45° intercardinals -->
      <line x1="78" y1="14" x2="81" y2="11" stroke="#dd1111" stroke-width="0.7" stroke-opacity="0.3"/>
      <line x1="86" y1="78" x2="89" y2="81" stroke="#dd1111" stroke-width="0.7" stroke-opacity="0.3"/>
      <line x1="22" y1="86" x2="19" y2="89" stroke="#dd1111" stroke-width="0.7" stroke-opacity="0.3"/>
      <line x1="14" y1="22" x2="11" y2="19" stroke="#dd1111" stroke-width="0.7" stroke-opacity="0.3"/>
    </g>

    <!-- ── 2. Wings — left feathers ──────────────────────────
         Class: orp-wing-l → CSS shimmer alternates opacity/scaleY
         Points scaled from Sigil.svg 200×200 → 100×100 (÷2)
    ─────────────────────────────────────────────────────── -->
    <g class="orp-wing-l" style="transform-origin:50px 50px">
      <!-- Primary upper feather -->
      <polygon points="50,50 15,27 9,41 28,47"
               fill="url(#orp-wing-grad-l)"
               stroke="#dd1111" stroke-width="0.5" stroke-opacity="0.5"
               filter="url(#orp-glow-outer)"/>
      <!-- Secondary mid feather -->
      <polygon points="50,50 10,40 7,55 25,55"
               fill="url(#orp-wing-grad-l)"
               stroke="#dd1111" stroke-width="0.5" stroke-opacity="0.4"
               fill-opacity="0.7"
               filter="url(#orp-glow-outer)"/>
      <!-- Tertiary lower feather -->
      <polygon points="50,50 15,55 11,69 30,62"
               fill="url(#orp-wing-grad-l)"
               stroke="#ff6600" stroke-width="0.4" stroke-opacity="0.3"
               fill-opacity="0.5"/>
      <!-- Feather spine lines -->
      <line x1="50" y1="50" x2="12" y2="35" stroke="#ff4400" stroke-width="0.6" stroke-opacity="0.38"/>
      <line x1="50" y1="50" x2="8"  y2="48" stroke="#dd1111" stroke-width="0.6" stroke-opacity="0.32"/>
      <line x1="50" y1="50" x2="13" y2="63" stroke="#ff4400" stroke-width="0.5" stroke-opacity="0.28"/>
      <!-- Wing leading edge arc outline -->
      <polyline points="15,27 8,48 11,69"
                fill="none" stroke="#dd1111" stroke-width="0.8" stroke-opacity="0.28"
                filter="url(#orp-glow-soft)"/>
    </g>

    <!-- ── 3. Wings — right feathers ─────────────────────────
         Class: orp-wing-r → CSS shimmer alternates in reverse phase
    ─────────────────────────────────────────────────────── -->
    <g class="orp-wing-r" style="transform-origin:50px 50px">
      <!-- Primary upper feather -->
      <polygon points="50,50 85,27 91,41 72,47"
               fill="url(#orp-wing-grad-r)"
               stroke="#dd1111" stroke-width="0.5" stroke-opacity="0.5"
               filter="url(#orp-glow-outer)"/>
      <!-- Secondary mid feather -->
      <polygon points="50,50 90,40 93,55 75,55"
               fill="url(#orp-wing-grad-r)"
               stroke="#dd1111" stroke-width="0.5" stroke-opacity="0.4"
               fill-opacity="0.7"
               filter="url(#orp-glow-outer)"/>
      <!-- Tertiary lower feather -->
      <polygon points="50,50 85,55 89,69 70,62"
               fill="url(#orp-wing-grad-r)"
               stroke="#ff6600" stroke-width="0.4" stroke-opacity="0.3"
               fill-opacity="0.5"/>
      <!-- Feather spine lines -->
      <line x1="50" y1="50" x2="88" y2="35" stroke="#ff4400" stroke-width="0.6" stroke-opacity="0.38"/>
      <line x1="50" y1="50" x2="92" y2="48" stroke="#dd1111" stroke-width="0.6" stroke-opacity="0.32"/>
      <line x1="50" y1="50" x2="87" y2="63" stroke="#ff4400" stroke-width="0.5" stroke-opacity="0.28"/>
      <!-- Wing leading edge arc outline -->
      <polyline points="85,27 92,48 89,69"
                fill="none" stroke="#dd1111" stroke-width="0.8" stroke-opacity="0.28"
                filter="url(#orp-glow-soft)"/>
    </g>

    <!-- ── 4. Core group — hexagon, fill, triangles, diamond ─
         Class: orp-core-group → CSS breathe (scale+rotate)
    ─────────────────────────────────────────────────────── -->
    <g class="orp-core-group" style="transform-origin:50px 50px">

      <!-- Hexagon outline (dashed) -->
      <polygon points="50,26 71,38 71,62 50,74 29,62 29,38"
               fill="none"
               stroke="#dd1111" stroke-width="0.7"
               stroke-opacity="0.22" stroke-dasharray="4 3"/>

      <!-- Core radial fill -->
      <circle cx="50" cy="50" r="23" fill="url(#orp-core-fill)"/>

      <!-- Outer triangle — red -->
      <polygon points="50,22 74,64 26,64"
               fill="rgba(221,17,17,0.07)"
               stroke="#dd1111" stroke-width="1.8"
               stroke-linejoin="round"
               filter="url(#orp-glow-core)"/>

      <!-- Mid triangle — orange -->
      <polygon points="50,33 64,58 36,58"
               fill="rgba(255,68,0,0.05)"
               stroke="#ff4400" stroke-width="1.4"
               stroke-linejoin="round"
               filter="url(#orp-glow-core)"/>

      <!-- Inner triangle — cyan -->
      <polygon points="50,40 58,55 42,55"
               fill="rgba(0,212,255,0.04)"
               stroke="#00d4ff" stroke-width="1.1"
               stroke-linejoin="round"
               filter="url(#orp-glow-cyan)"/>

      <!-- Diamond core -->
      <polygon points="50,44 55,50 50,56 45,50"
               fill="#ff4400" fill-opacity="0.88"
               filter="url(#orp-glow-core)"/>

      <!-- White singularity dot -->
      <circle cx="50" cy="50" r="2.5"
              fill="#ffffff" fill-opacity="0.88"
              filter="url(#orp-glow-core)"/>

      <!-- Cardinal axis tick marks (inside core) -->
      <line x1="50" y1="24" x2="50" y2="29" stroke="#dd1111" stroke-width="0.7" stroke-opacity="0.55"/>
      <line x1="50" y1="71" x2="50" y2="76" stroke="#dd1111" stroke-width="0.7" stroke-opacity="0.55"/>
      <line x1="27" y1="50" x2="32" y2="50" stroke="#dd1111" stroke-width="0.7" stroke-opacity="0.55"/>
      <line x1="68" y1="50" x2="73" y2="50" stroke="#dd1111" stroke-width="0.7" stroke-opacity="0.55"/>
    </g>

    <!-- ── 5. Fracture shards — drift-gated via CSS opacity ───
         Class: orp-fracture → CSS opacity: var(--lm-fracture-opacity)
         Placed at the three triangle tip corners + edge scatter
    ─────────────────────────────────────────────────────── -->
    <g class="orp-fracture">
      <!-- Apex tip shards (top) -->
      <polygon points="46,23  40,16  43,25"   fill="#dd1111" fill-opacity="0.55" stroke="#dd1111" stroke-width="0.4" filter="url(#orp-glow-soft)"/>
      <polygon points="54,23  60,16  57,25"   fill="#ff6600" fill-opacity="0.45" stroke="#ff6600" stroke-width="0.35"/>
      <line x1="40" y1="16" x2="35" y2="10"  stroke="#dd1111" stroke-width="0.7" stroke-opacity="0.75"/>
      <line x1="60" y1="16" x2="65" y2="10"  stroke="#ff6600" stroke-width="0.5" stroke-opacity="0.65"/>
      <!-- Bottom-left tip shards -->
      <polygon points="28,63  21,68  26,58"   fill="#dd1111" fill-opacity="0.50" stroke="#dd1111" stroke-width="0.4" filter="url(#orp-glow-soft)"/>
      <line x1="21" y1="68" x2="16" y2="74"  stroke="#ff4400" stroke-width="0.7" stroke-opacity="0.65"/>
      <!-- Bottom-right tip shards -->
      <polygon points="72,63  79,68  74,58"   fill="#dd1111" fill-opacity="0.50" stroke="#dd1111" stroke-width="0.4" filter="url(#orp-glow-soft)"/>
      <line x1="79" y1="68" x2="84" y2="74"  stroke="#ff4400" stroke-width="0.7" stroke-opacity="0.65"/>
      <!-- Scatter pixels -->
      <circle cx="24" cy="45" r="0.9" fill="#dd1111" fill-opacity="0.65"/>
      <circle cx="76" cy="38" r="0.8" fill="#ff6600" fill-opacity="0.55"/>
      <circle cx="28" cy="65" r="0.7" fill="#00d4ff" fill-opacity="0.75"/>
      <circle cx="72" cy="65" r="0.9" fill="#dd1111" fill-opacity="0.55"/>
      <circle cx="50" cy="16" r="0.8" fill="#ff4400" fill-opacity="0.65"/>
      <!-- Fracture trace lines from core to tips -->
      <line x1="50" y1="44" x2="44" y2="32"  stroke="#dd1111" stroke-width="0.55" stroke-opacity="0.60"/>
      <line x1="50" y1="44" x2="56" y2="32"  stroke="#dd1111" stroke-width="0.55" stroke-opacity="0.60"/>
      <line x1="42" y1="55" x2="32" y2="60"  stroke="#ff4400" stroke-width="0.45" stroke-opacity="0.50"/>
      <line x1="58" y1="55" x2="68" y2="60"  stroke="#ff4400" stroke-width="0.45" stroke-opacity="0.50"/>
    </g>

    <!-- ── 6. Glitch layer — jitter displacement copies ───────
         Class: orp-glitch-layer → CSS sigilJitter animation
         Opacity: driven by --lm-drift-intensity (CSS var)
    ─────────────────────────────────────────────────────── -->
    <g class="orp-glitch-layer">
      <!-- Cyan offset copy of outer triangle (+1, -0.5) -->
      <polygon points="51,22 75,64 27,64"
               fill="none"
               stroke="#00d4ff" stroke-width="0.75" stroke-opacity="0.55"
               transform="translate(1, -0.5)"
               filter="url(#orp-glow-cyan)"/>
      <!-- Red offset copy of outer triangle (-1, +0.5) -->
      <polygon points="49,22 73,64 25,64"
               fill="none"
               stroke="#ff3333" stroke-width="0.75" stroke-opacity="0.45"
               transform="translate(-1, 0.5)"/>
    </g>

    <!-- ── 7. Scanlines — horizontal pixel bleeds ─────────────
         Class: orp-scanline → CSS mix-blend-mode:screen + opacity
         Clipped to outer triangle shape
    ─────────────────────────────────────────────────────── -->
    <g class="orp-scanline" clip-path="url(#orp-scan-clip)" style="mix-blend-mode:screen">
      <rect x="30" y="46" width="40" height="1.2" fill="#dd1111" fill-opacity="0.28"/>
      <rect x="30" y="50" width="40" height="0.9" fill="#00d4ff" fill-opacity="0.22"/>
      <rect x="30" y="54" width="40" height="1.2" fill="#ff6600" fill-opacity="0.18"/>
      <rect x="38" y="28" width="24" height="1.5" fill="#dd1111" fill-opacity="0.32"/>
      <rect x="33" y="62" width="34" height="1.2" fill="#ff4400" fill-opacity="0.28"/>
    </g>

  </symbol>


  <!-- ═══════════════════════════════════════════════════════════
       SYMBOL: orp-favicon-mark
       Clean no-filter fallback — same triangle geometry,
       no gradients or animations. For <link rel="icon"> use.
       ═══════════════════════════════════════════════════════════ -->
  <symbol id="orp-favicon-mark" viewBox="0 0 100 100">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="50,22 74,64 26,64" stroke="#dd1111" stroke-width="5.5"/>
      <polygon points="50,33 64,58 36,58" stroke="#ff4400" stroke-width="4"/>
      <polygon points="50,40 58,55 42,55" stroke="#00d4ff" stroke-width="3"/>
      <polygon points="50,44 55,50 50,56 45,50" fill="#ff4400" fill-opacity="0.9"/>
      <circle cx="50" cy="50" r="2.5" fill="#ffffff" fill-opacity="0.9"/>
    </g>
  </symbol>


  <!-- ═══════════════════════════════════════════════════════════
       LEGACY ALIASES — backwards-compatible with old #logo-mark
       and #favicon-mark references already in page HTML.
       These simply re-use the new symbols so old <use> tags
       don't break during a staged migration.
       ═══════════════════════════════════════════════════════════ -->
  <symbol id="logo-mark"    viewBox="0 0 100 100" overflow="visible">
    <use href="#orp-logo-mark"/>
  </symbol>
  <symbol id="favicon-mark" viewBox="0 0 100 100">
    <use href="#orp-favicon-mark"/>
  </symbol>

</svg>
